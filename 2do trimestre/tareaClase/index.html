<!DOCTYPE html>

<html lang="es">

<head>
  <!-- Configuración del documento: codificación UTF-8 y viewport para diseño responsivo -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Título que aparece en la pestaña del navegador -->
  <title>Raul Sal Romeo</title>
  
  <!-- Inicio de la sección de estilos CSS -->
  <style>
    /* Estilos generales del cuerpo de la página */
    body {
      /* Color de fondo gris claro por defecto */
      background-color: #f5f5f5;
      /* Fuente tipográfica Helvetica Neue con alternativas */
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      /* Uso de flexbox para centrar el contenido */
      display: flex;
      justify-content: center;
      align-items: center;
      /* Altura mínima igual a la viewport para centrar verticalmente */
      min-height: 100vh;
      /* Eliminar márgenes por defecto */
      margin: 0;
    }

    /* Contenedor principal del carrusel */
    .carousel-container {
      /* Ancho fijo de 600px */
      width: 600px;
      /* Fondo blanco */
      background: white;
      /* Espaciado interno de 20px */
      padding: 20px;
      /* Bordes redondeados de 20px */
      border-radius: 20px;
      /* Sombra suave alrededor del contenedor */
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }

    /* Wrapper que contiene todos los slides - permite scroll horizontal */
    .scroll-snap-wrapper {
      /* Elementos en línea (horizontal) */
      display: flex;
      /* Ocultar overflow horizontal pero permitir scroll */
      overflow-x: auto;
      /* Espacio de 10px entre slides */
      gap: 10px;
      /* Tipo de scroll-snap: obligatorio en eje horizontal */
      scroll-snap-type: x mandatory;
      /* Comportamiento de scroll suave */
      scroll-behavior: smooth;
      /* Ocultar barra de scroll en Firefox */
      scrollbar-width: none;
      /* Espaciado inferior para el scroll */
      padding-bottom: 20px;
    }

    /* Ocultar barra de scroll en Chrome/Safari/Edge */
    .scroll-snap-wrapper::-webkit-scrollbar {
      display: none;
    }

    /* Estilos para cada slide individual */
    .slide {
      /* No permitir que el slide se encoja (flex: 0 0 100% = mantener ancho completo) */
      flex: 0 0 100%;
      /* El snap del scroll se alinea al centro */
      scroll-snap-align: center;
      /* Posición relativa para posicionamiento interno */
      position: relative;
      /* Centrar texto dentro del slide */
      text-align: center;
    }

    /* Estilos para las imágenes dentro de cada slide */
    .slide img {
      /* Ancho completo del contenedor */
      width: 100%;
      /* Altura fija de 350px */
      height: 350px;
      /* Mantener proporción sin distorsionar (contain) */
      object-fit: contain;
      /* Sombra suave tipo drop-shadow */
      filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.2));
    }

    /* Estilos para la información debajo de cada imagen */
    .info {
      /* Margen superior de 10px */
      margin-top: 10px;
      /* Texto en negrita */
      font-weight: bold;
      /* Color de texto gris oscuro */
      color: #333;
    }

    /* Contenedor de los controles de navegación */
    .controls {
      /* Flexbox para distribuir elementos */
      display: flex;
      /* Espacio entre elementos */
      justify-content: space-between;
      /* Centrar verticalmente */
      align-items: center;
      /* Margen superior de 10px */
      margin-top: 10px;
      /* Espaciado interno de 10px */
      padding: 10px;
      /* Fondo negro */
      background: #111;
      /* Bordes muy redondeados (forma de pastilla) */
      border-radius: 50px;
    }

    /* Estilos base para los botones de navegación */
    .btn {
      /* Color de texto blanco */
      color: white;
      /* Eliminar subrayado de enlace */
      text-decoration: none;
      /* Espaciado interno: 10px vertical, 20px horizontal */
      padding: 10px 20px;
      /* Bordes redondeados de 20px */
      border-radius: 20px;
      /* Tamaño de fuente de 14px */
      font-size: 14px;
      /* Texto en negrita */
      font-weight: bold;
      /* Transición suave del color de fondo */
      transition: background 0.2s;
    }

    /* Estilos cuando el cursor está sobre un botón */
    .btn:hover {
      /* Color de fondo gris oscuro al pasar el mouse */
      background: #333;
    }

    /* Clase para botones deshabilitados (opacidad reducida) */
    .btn.disabled {
      /* Opacidad del 30% */
      opacity: 0.3;
      /* Cursor por defecto (no pointer) */
      cursor: default;
      /* Desactivar eventos de puntero (no clickable) */
      pointer-events: none;
    }

    /* Grupo dinámico que contiene múltiples botones superpuestos */
    .dynamic-group {
      /* Posición relativa para posicionar hijos absolutamente */
      position: relative;
      /* Ancho de 40px */
      width: 40px;
      /* Altura de 40px */
      height: 40px;
    }

    /* Botones dentro del grupo dinámico - posicionados absolutamente */
    .dynamic-group .btn {
      /* Posición absoluta respecto al grupo */
      position: absolute;
      /* Centrar verticalmente */
      top: 50%;
      /* Centrar horizontalmente */
      left: 50%;
      /* Trasladar desde el centro (-50%) */
      transform: translate(-50%, -50%);
      /* Espaciado interno más pequeño */
      padding: 8px 14px;
      /* Ocultar por defecto (se mostrarán con :has()) */
      display: none;
    }

    /* Clase que muestra el botón de siguiente por defecto al inicio */
    .default-start {
      display: block !important;
    }

    /* Placeholder que se muestra cuando no hay navegación activa */
    .placeholder {
      display: block !important;
    }

    /* ========== LÓGICA DE NAVEGACIÓN CON SELECTOR :has() ========== */
    /* Cuando el slide #n1 está activo (target), mostrar botón next a n2 */
    body:has(#n1:target) .controls .next.to-n2 {
      display: block !important;
    }

    /* Ocultar botón default-start cuando n1 está activo */
    body:has(#n1:target) .controls .default-start {
      display: none !important;
    }

    /* Slide #n2: mostrar botón prev hacia n1 Y next hacia n3 */
    body:has(#n2:target) .controls .prev.to-n1 {
      display: block !important;
    }

    body:has(#n2:target) .controls .next.to-n3 {
      display: block !important;
    }

    body:has(#n2:target) .controls .placeholder,
    body:has(#n2:target) .controls .default-start {
      display: none !important;
    }

    /* Slide #n3: mostrar botón prev hacia n2 Y next hacia n4 */
    body:has(#n3:target) .controls .prev.to-n2 {
      display: block !important;
    }

    body:has(#n3:target) .controls .next.to-n4 {

    body:has(#n5:target) .controls .placeholder,

    /* Slide #n6: mostrar botón prev hacia n5 Y next hacia n7 */
